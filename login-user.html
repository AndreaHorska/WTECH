
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Lucky Quacky</title>
  <link rel="stylesheet" href="user_style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<main class="main">
    <section class="login-window">
        <a href="homepage.html" class="logo-account">Lucky<span>Quacky</span></a>
        <form class="p-4 bg-light border rounded form-box">
            <h3 class="mb-3">Login</h3>

            <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input type="email" class="form-control" placeholder="example@email.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control">
            </div>

            <button class="btn btn-warning w-100">Login</button>

            <hr>

            <button type="button" class="btn btn-outline-secondary w-100"
                onclick="location.href='register-user.html'">
                New registration
            </button>
        </form>
    </section>
</main>




<script src="index.js"></script>
</body>
</html>
