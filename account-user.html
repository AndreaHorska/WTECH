
<!DOCTYPE html>
<html lang="en">
<head>
<title>Lucky Quacky</title>
  <link rel="stylesheet" href="user_style.css">
  <link rel="stylesheet" href="header_footer.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="body">

<header class="header">
  <a href="homepage.html" class="logo">Lucky<span>Quacky</span></a>
  <div class="search-frame">
    <form class="search">
      <input type="text" placeholder="Hľadaj produkty...">
      <button class="search-button">Search</button>
    </form>
  </div>
  <div class="icons">
    <a href="">
    <svg class="icon" viewBox="0 0 24 24">
    <path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.2 14h9.6c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 21.29 5H6.21l-.94-2H2v2h2l3.6 7.59-1.35 2.44C5.52 15.37 6.48 17 8 17h12v-2H8l1.2-1z"/>
    </svg>
    </a>

    <a class="profile" href="account-user.html">
    <svg class="icon" viewBox="0 0 24 24">
    <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
    </svg>
    </a>

  </div>
</header>

<main class="login-window">
  <a href="homepage.html" class="logo-account">Lucky<span>Quacky</span></a>
  <section class="info-box">
    <form class="account-tab">
      <h3>Account details</h3>
      <label for="first-name">First Name</label>
      <input type="text" id="first-name" name="given-name" autocomplete="given-name">

      <label for="last-name">Last Name</label>
      <input type="text" id="last-name" name="family-name" autocomplete="family-name">

      <label for="street-address">Street Address</label>
      <input type="text" id="street-address" name="street-address" autocomplete="street-address">

      <label for="street-number">Street Number</label>
      <input type="text" id="street-number" name="address-line1" autocomplete="address-line1">

      <label for="city">City</label>
      <input type="text" id="city" name="address-level2" autocomplete="address-level2">

      <label for="zip">Postal Code</label>
      <input type="text" id="zip" name="postal-code" autocomplete="postal-code">

      <button class="first-button">Save changes</button>
    </form>

    <form class="password-tab">
      <h3>Change password</h3>

      <label for="password">New Password</label>
      <input type="password" id="password">

      <label for="password-confirm">Confirm Password</label>
      <input type="password" id="password-confirm">

      <button class="first-button">Change password</button>
    </form>
  </section>
</main>

<div class="oddelovac"></div>

<script src="index.js"></script>
</body>
</html>
