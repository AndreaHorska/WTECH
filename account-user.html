
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lucky Quacky</title>
  <link rel="stylesheet" href="user_style.css">
  <link rel="stylesheet" href="header_footer.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="body">

<header class="header">
    <a href="homepage.html" class="logo">Lucky<span>Quacky</span></a>
    <div class="search-frame">
        <form action="/search" method="GET" class="search">
            <div class="search-icon-box">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
            </div>

            <label for="search" class="visually-hidden">What are you looking for?</label>
            <input id="search" type="text" name="query" placeholder="What are you looking for?" class="search-input">
            <button type="submit" class="search-button">Search</button>
        </form>
    </div>
    <div class="icons">
      <a class="cart" href="cart.html">
          <svg class="icon" viewBox="0 0 24 24">
              <path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.2 14h9.6c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 21.29 5H6.21l-.94-2H2v2h2l3.6 7.59-1.35 2.44C5.52 15.37 6.48 17 8 17h12v-2H8l1.2-1z"/>
          </svg>
      </a>

      <a class="profile" href="register-user.html">
          <svg class="icon" viewBox="0 0 24 24">
              <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
          </svg>
      </a>
    </div>
</header>

<main class="container py-4">

  <div class="text-center mb-4">
    <a href="homepage.html" class="logo-account">Lucky<span>Quacky</span></a>
  </div>

  <div class="row justify-content-center g-3">

    <div class="col-12 col-md-6 col-lg-4">
      <form class="p-4 bg-light border rounded h-100">
        <h3 class="mb-3">Account details</h3>

        <div class="mb-3">
          <label class="form-label">First Name</label>
          <input type="text" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Street Address</label>
          <input type="text" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Street Number</label>
          <input type="text" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">City</label>
          <input type="text" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Postal Code</label>
          <input type="text" class="form-control">
        </div>

        <button class="btn btn-warning w-100">Save changes</button>
      </form>
    </div>

    <div class="col-12 col-md-6 col-lg-4">
      <form class="p-4 bg-light border rounded h-100">
        <h3 class="mb-3">Change password</h3>

        <div class="mb-3">
          <label class="form-label">New Password</label>
          <input type="password" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control">
        </div>

        <button class="btn btn-warning w-100 mb-3">Change password</button>

        <hr>

        <button type="button" class="btn btn-outline-secondary w-100">
          Logout
        </button>
      </form>
    </div>

  </div>
</main>

<div class="oddelovac"></div>

<script src="index.js"></script>
</body>
</html>
