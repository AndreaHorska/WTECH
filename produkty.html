<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lucky Quacky - Duck Store</title>
    <link href="stylesA.css" rel="stylesheet" />
</head>

<body>

<header class ="header">
    <div class="logo">
        <img src="duck.png" alt="Duck logo" class="logo-image">
        <div class="logo-text">Lucky<br>Quacky</div>
    </div>

    <search class="search-container">
        <form action="/search" method="GET" class="search-box">
            <!-- interactive controls for submitting information
            action - kam presmeruje, url, moja webstranka/search
            method get - data sa prilepia priamo do url (post je tajne) -->
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <!-- stroke="currentColor" - podla css
                viewBox="minX minY width height"  - vnutorne suradnice kreslenia*/ -->
                <circle cx="11" cy="11" r="8"></circle>  /* center x, y + r */
                <path d="m21 21-4.35-4.35"></path>  /* m21 21 - pravy dolny roh, ciara hore dolave posunute o 4.35 px (- 4.35) */
            </svg>
            <label for="search" class="visually-hidden">What are you looking for?</label>
            <!-- label je pri citani stranky pre nevidiacich -->
            <input id="search" type="text" name="query" placeholder="What are you looking for?" class="search-input">
            <!-- name="query" -> v url sa zmeni query="input" (input - to, co napisal do hladania, query je dotaz) -->
            <button class="search-button">Search</button>
        </form>
    </search>

    <nav class="menu">
        <a href="#" class="menu-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <!-- m3 9 - zaciatok, v11 - vertical, dole o 11, H - dolava a ... - zaoblenie, z - close path -->
                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <!-- zacni 9 22, chod 9 12, potom 15 12, 15 22 -->
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            Home
        </a>
        <a href="#" class="menu-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M6 6h15l-1.5 9h-13z"></path>
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="18" cy="21" r="1"></circle>
                <line x1="6" y1="6" x2="3" y2="2"></line>
            </svg>
            Cart
        </a>
        <a href="#" class="menu-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            Profile
        </a>
    </nav>
</header>

<main class="main-content">
    <aside class="sidebar">
        <h2 class="filter-title">Filter</h2>

        <section class="filter-section">
            <h3 class="filter-heading">Price</h3>
            <div class="slider" id="slider">
                <div class="track"></div>
                <div class="progress" id="progress"></div>
                <div class="handle" id="minHandle"></div>
                <div class="handle" id="maxHandle"></div>
            </div>
            <div class="price-inputs">
                <label for="minInput" class="visually-hidden">Minimum Price</label>
                <input type="number" value="12" min="0" max="200" class="price-input" id="minInput">
                <label for="maxInput" class="visually-hidden">Maximum Price</label>
                <input type="number" value="132" min="0" max="200" class="price-input" id="maxInput">
            </div>
        </section>

        <section class="filter-section">
            <h3 class="filter-heading">Star Rating (min.)</h3>
            <div class="stars" id="starRating">
                <svg style="display:none;">
                    <symbol id="star-icon" viewBox="0 0 24 24">
                        <path d="M12 2l3 7 7 .5-5.5 4.5 1.5 7-6-4-6 4 1.5-7L2 9.5 9 9z"/>
                    </symbol>
                </svg>

                <div class="stars">
                    <svg class="star" data-value="1"><use href="#star-icon"></use></svg>
                    <svg class="star" data-value="2"><use href="#star-icon"></use></svg>
                    <svg class="star" data-value="3"><use href="#star-icon"></use></svg>
                    <svg class="star" data-value="4"><use href="#star-icon"></use></svg>
                    <svg class="star" data-value="5"><use href="#star-icon"></use></svg>
                </div>
            </div>
        </section>

        <section class="filter-section">
            <h3 class="filter-heading">Accessories</h3>
            <div class="accessories-filer">
                <h4 class="filter-subheading">Outfits</h4>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="checkbox"><span>Hats</span></label>
                    <label class="checkbox-label"><input type="checkbox" checked><span>Glasses</span></label>
                    <label class="checkbox-label"><input type="checkbox"><span>Tie</span></label>
                    <label class="checkbox-label"><input type="checkbox"><span>T-Shirt</span></label>
                    <label class="checkbox-label"><input type="checkbox"><span>Jacket</span></label>
                </div>
            </div>
            <div class="accessories-filer">
                <h4 class="filter-subheading">Professions</h4>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="checkbox"><span>Student</span></label>
                    <label class="checkbox-label"><input type="checkbox"><span>Scientist</span></label>
                    <label class="checkbox-label"><input type="checkbox"><span>White Collar</span></label>
                    <label class="checkbox-label"><input type="checkbox"><span>Other</span></label>
                </div>
            </div>
            <div class="accessories-filer">
                <h4 class="filter-subheading">Gear</h4>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="checkbox"><span>Weapons</span></label>
                    <label class="checkbox-label"><input type="checkbox"><span>Tools</span></label>
                    <label class="checkbox-label"><input type="checkbox"><span>School</span></label>
                    <label class="checkbox-label"><input type="checkbox"><span>Sports</span></label>
                    <label class="checkbox-label"><input type="checkbox"><span>DIY</span></label>
                </div>
            </div>
        </section>
        <button class="filter-button">Filter</button>
    </aside>


</main>

<footer>
    <p>© 2026 Lucky Quacky</p>
    <a href="https://www.flaticon.com/free-icons/duck" title="duck icons">Duck icons created by vectorsmarket15 - Flaticon</a>

</footer>

<script src="filter.js"></script>
</body>
