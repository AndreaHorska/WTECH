
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Lucky Quacky</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="header_footer.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<header class="header">
  <a href="homepage.html" class="logo">Lucky<span>Quacky</span></a>
  <div class="search-frame">
    <form class="search">
      <input type="text" placeholder="Hľadaj produkty...">
      <button class="search-button">Search</button>
    </form>
  </div>
  <div class="icons">
    <a href="">
    <svg class="icon" viewBox="0 0 24 24">
    <path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.2 14h9.6c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 21.29 5H6.21l-.94-2H2v2h2l3.6 7.59-1.35 2.44C5.52 15.37 6.48 17 8 17h12v-2H8l1.2-1z"/>
    </svg>
    </a>

    <a href="">
    <svg class="icon" viewBox="0 0 24 24">
    <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
    </svg>
    </a>

  </div>

</header>

<main class="main">
  <section class="product_section">
    <div class="product_gallery">
      <div class="thumbnails">
        <div class="thumb">A</div>
        <div class="thumb">B</div>
        <div class="thumb">C</div>
      </div>
      <div class="main_product_box">
        <img src="image/cart.png" alt="main image">
      </div>
    </div>
    <div class="product_info">
      <h1>Názov produktu</h1>
      <span class="star-icons">★★★★★</span>
      <div class="description">
        Vsetok popis tu
      </div>
      <p>Cena: 49€</p>
    </div>
  </section>

</main>

<div class="oddelovac"></div>

<section class="specification">
  <div class="left_spec">
    <h2>Specification</h2>
    <table class="spec-table">
      <tr>
        <td>Material</td>
        <td>Plastic</td>
      </tr>
      <tr>
        <td>Size</td>
        <td>10 cm</td>
      </tr>
      <tr>
        <td>Weight</td>
        <td>200 g</td>
      </tr>
      <tr>
        <td>Color</td>
        <td>Yellow</td>
      </tr>
      <tr>
        <td>Age</td>
        <td>3+</td>
      </tr>
      <tr>
        <td>Country of origin</td>
        <td>Slovakia</td>
      </tr>
    </table>
  </div>
  <div class="right_spec">
    <p>Some info</p>
    <p>Some info</p>
  </div>
</section>

<div class="oddelovac"></div>



<footer class="footer">
  <p>© 2026 Lucky Quacky</p>
</footer>

<script src="index.js"></script>
</body>
</html>
