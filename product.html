
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Lucky Quacky</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<header class="navbar">
  <div class="logo">LOGO</div>
  <div class="search_frame">
    <form class="search">
      <input type="text" placeholder="Hľadaj produkty...">
      <button class="search_button">Search</button>
    </form>
  </div>
  <div class="icons">
    <a href=""><img src="image/cart.png" alt="Cart"></a>
    <a href=""><img src="image/user.png" alt="User"></a>
  </div>
</header>

<main class="main">
  <section class="product_section">
    <div class="product_gallery">
      <div class="thumbnails">
        <div class="thumb">A</div>
        <div class="thumb">B</div>
        <div class="thumb">C</div>
      </div>
      <div class="main_product_box">
        <img src="image/cart.png" alt="main image">
      </div>
    </div>
    <div class="product_info">
      <h1>Názov produktu</h1>
      <span class="star-icons">★★★★★</span>
      <div class="description">
        Vsetok popis tu
      </div>
      <p>Cena: 49€</p>
    </div>
  </section>

</main>

<div class="oddelovac"></div>

<section class="specification">
  <div class="left_spec">
    <h2>Specification</h2>
    <table class="spec-table">
      <tr>
        <td>Material</td>
        <td>Plastic</td>
      </tr>
      <tr>
        <td>Size</td>
        <td>10 cm</td>
      </tr>
      <tr>
        <td>Weight</td>
        <td>200 g</td>
      </tr>
      <tr>
        <td>Color</td>
        <td>Yellow</td>
      </tr>
      <tr>
        <td>Age</td>
        <td>3+</td>
      </tr>
      <tr>
        <td>Country of origin</td>
        <td>Slovakia</td>
      </tr>
    </table>
  </div>
  <div class="right_spec">
    <p>Some info</p>
    <p>Some info</p>
  </div>
</section>

<div class="oddelovac"></div>



<footer class="footer">
  <p>© 2026 Lucky Quacky</p>
</footer>

<script src="index.js"></script>
</body>
</html>
