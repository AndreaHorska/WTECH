<!DOCTYPE html>
<html lang="en">
<head>
    <title>Lucky Quacky</title>
  <link rel="stylesheet" href="user_style.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<main class="main">
    <section class="login-window">
        <a href="homepage.html" class="logo-account">Lucky<span>Quacky</span></a>
        <form class="login-tab">
            <h3>Registration</h3>
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="example@email.com" required>
            <label for="password">Password</label>
            <input type="password" id="password">
            <button class="first-button">Create account</button>
            <hr>
            <button type="button" class="secondary-button" onclick="location.href='login-user.html'">
                Have account? Login
            </button>
        </form>
    </section>
</main>




<script src="index.js"></script>
</body>
</html>
