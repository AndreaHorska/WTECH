<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lucky Quacky</title>
    <link rel="stylesheet" href="user_style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<main class="main">
    <section class="login-window">
        <header>
            <a href="homepage.html" class="logo-account">Lucky<span>Quacky</span></a>
        </header>

        <form class="p-4 bg-light border rounded form-box"
              onsubmit="window.location.href='account-user.html'; return false;">
            <h1 class="mb-3 h3">Registration</h1>

            <div class="mb-3">
                <label for="reg-email" class="form-label">E-mail</label>
                <input id="reg-email" type="email" class="form-control" placeholder="example@email.com" required>
            </div>

            <div class="mb-3">
                <label for="reg-password" class="form-label">Password</label>
                <input id="reg-password" type="password" class="form-control" minlength="8" required>
            </div>

            <div class="mb-3">
                <label for="reg-password-confirm" class="form-label">Confirm password</label>
                <input id="reg-password-confirm" type="password" class="form-control" minlength="8" required>
            </div>

            <button type="submit" class="btn btn-warning w-100">Create account</button>

            <hr>

            <button type="button" class="btn btn-outline-secondary w-100"
                    onclick="location.href='login-user.html'">
                Have account? Login
            </button>
        </form>
    </section>
</main>

</body>
</html>
