<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - Lucky Quacky</title>
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="header_footer.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header class="header">
    <a href="index.html" class="logo">Lucky<span>Quacky</span></a>
    <div class="search-frame">
        <form action="/search" method="GET" class="search">
            <div class="search-icon-box">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
            </div>

            <label for="search" class="visually-hidden">What are you looking for?</label>
            <input id="search" type="text" name="query" placeholder="What are you looking for?" class="search-input">
            <button type="submit" class="search-button">Search</button>
        </form>
    </div>
    <div class="icons">
      <a class="cart" href="cart.html">
          <svg class="icon" viewBox="0 0 24 24">
              <path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.2 14h9.6c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 21.29 5H6.21l-.94-2H2v2h2l3.6 7.59-1.35 2.44C5.52 15.37 6.48 17 8 17h12v-2H8l1.2-1z"/>
          </svg>
      </a>

      <a class="profile" href="account-user.html">
          <svg class="icon" viewBox="0 0 24 24">
              <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
          </svg>
      </a>
    </div>
</header>

<main class="main container mt-4">

  <div class="d-flex justify-content-between align-items-center">
    <h2>Admin - Products</h2>
    <button class="btn btn-primary"
    onclick="location.href='edit-product.html'">+ Add product</button>
  </div>

  <div class="table-responsive">
    <table class="table table-hover align-middle">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Image</th>
          <th>Name</th>
          <th>Price</th>
          <th>Category</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>1</td>
          <td><img src="image/duck_with_sunglasses.png" width="50"></td>
          <td>Duck with Sunglasses</td>
          <td>12.99€</td>
          <td>Funny</td>
          <td>
            <button class="btn btn-sm btn-warning"
                onclick="location.href='edit-product.html'">Edit</button>
            <button class="btn btn-sm btn-danger">Delete</button>
          </td>
        </tr>

        <tr>
          <td>2</td>
          <td><img src="image/duck2.png" width="50"></td>
          <td>Luxury Duck</td>
          <td>50€</td>
          <td>Luxurious</td>
          <td>
            <button class="btn btn-sm btn-warning"
                onclick="location.href='edit-product.html'">Edit</button>
            <button class="btn btn-sm btn-danger">Delete</button>
          </td>
        </tr>

        <tr>
          <td>3</td>
          <td><img src="image/duck1.png" width="50"></td>
          <td>Funny Duck</td>
          <td>10€</td>
          <td>Luxurious</td>
          <td>
            <button class="btn btn-sm btn-warning"
                onclick="location.href='edit-product.html'">Edit</button>
            <button class="btn btn-sm btn-danger">Delete</button>
          </td>
        </tr>

      </tbody>
    </table>
  </div>

</main>

</body>
</html>
